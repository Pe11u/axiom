name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: windows
          - os: macos-latest
            platform: darwin
          - os: ubuntu-latest
            platform: linux

    runs-on: ${{ matrix.os }}
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Linux dependencies
        if: matrix.platform == 'linux'
        run: sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Install NSIS (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          choco install nsis -y
          echo "C:\Program Files (x86)\NSIS" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Set version from tag
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          sed -i.bak "s/\"productVersion\": \"[^\"]*\"/\"productVersion\": \"$VERSION\"/" wails.json
          rm -f wails.json.bak

      - name: Build (Windows)
        if: matrix.platform == 'windows'
        run: wails build -nsis

      - name: Build (macOS)
        if: matrix.platform == 'darwin'
        run: |
          wails build
          mkdir -p /tmp/axiom-dmg
          cp -r build/bin/Axiom.app /tmp/axiom-dmg/
          hdiutil create -volname "Axiom" -srcfolder /tmp/axiom-dmg -ov -format UDZO build/bin/Axiom-macos.dmg

      - name: Build (Linux)
        if: matrix.platform == 'linux'
        run: |
          wails build -tags webkit2_41
          cd build/bin && tar czf Axiom-linux-amd64.tar.gz Axiom

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            build/bin/*installer*.exe
            build/bin/*macos*.dmg
            build/bin/*linux*.tar.gz
